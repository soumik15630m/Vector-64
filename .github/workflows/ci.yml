name: CI

on:
  push:
  pull_request:

jobs:
  # C++ test suite: perft (per position, per depth), state/eval invariants and
  # the search signature — each a named ctest — across four compilers.
  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.cxx }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest,  cc: clang, cxx: clang++ }
          - { os: macos-latest }
          - { os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          EXTRA=""
          if [ -n "${{ matrix.cxx }}" ]; then EXTRA="-DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}"; fi
          if [ "${{ runner.os }}" = "macOS" ]; then EXTRA="$EXTRA -DENGINE_NATIVE=OFF"; fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build -j
      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure

  # Memory-safety / undefined-behaviour sweep of the make-unmake, movegen,
  # NNUE and search paths.
  sanitizers:
    name: linux asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (ASan + UBSan, Debug, no LTO)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug -DENGINE_LTO=OFF -DENGINE_NATIVE=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
      - name: Build
        run: cmake --build build -j
      - name: Consistency test under sanitizers
        working-directory: build
        run: ./bin/test_zobrist
      - name: Bench under sanitizers
        working-directory: build
        run: printf "setoption name Threads value 1\nbench 8\nquit\n" | ./bin/ChessEngine

  # Black-box UCI behaviour tests that drive the built engine binary.
  integration:
    name: uci behaviour
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build engine
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
      - name: Install pytest
        run: python -m pip install pytest
      - name: UCI behaviour suite
        env:
          ENGINE_BIN: build/bin/ChessEngine
        run: python -m pytest tests/python/test_uci_behavior.py -v

  # Python lint, types and the pure-Python contract tests.
  python-quality:
    name: python lint + types + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dev tooling
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: python -m ruff check tools tests
      - name: Mypy (types)
        run: python -m mypy tools tests/python
      - name: Pytest (contract tests)
        run: python -m pytest tests/python/test_feature_encoding.py -v
