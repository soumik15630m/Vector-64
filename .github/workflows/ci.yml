name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # C++ test suite: perft (per position, per depth), state/eval invariants and
  # the search signature — each a named ctest — across four compilers.
  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.cxx }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  cc: gcc,   cxx: g++,     id: linux-gcc }
          - { os: ubuntu-latest,  cc: clang, cxx: clang++, id: linux-clang }
          - { os: macos-latest,                            id: macos }
          - { os: windows-latest,                          id: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          EXTRA=""
          if [ -n "${{ matrix.cxx }}" ]; then EXTRA="-DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}"; fi
          if [ "${{ runner.os }}" = "macOS" ]; then EXTRA="$EXTRA -DENGINE_NATIVE=OFF"; fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build -j
      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure --output-junit "$GITHUB_WORKSPACE/ctest.xml"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure --output-junit "${{ github.workspace }}/ctest.xml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.id }}
          path: ctest.xml
          if-no-files-found: warn

  sanitizers:
    name: linux asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (ASan + UBSan, Debug, no LTO)
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug -DENGINE_LTO=OFF -DENGINE_NATIVE=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
      - name: Build
        run: cmake --build build -j
      - name: Consistency test under sanitizers
        working-directory: build
        run: ./bin/test_zobrist
      - name: Bench under sanitizers
        working-directory: build
        run: printf "setoption name Threads value 1\nbench 8\nquit\n" | ./bin/ChessEngine

  integration:
    name: uci behaviour
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build engine
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
      - name: Install pytest
        run: python -m pip install pytest
      - name: UCI behaviour suite
        env:
          ENGINE_BIN: build/bin/ChessEngine
        run: python -m pytest tests/python/test_uci_behavior.py -v --junitxml=pytest-uci.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-uci
          path: pytest-uci.xml

  python-quality:
    name: python lint + types + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dev tooling
        run: python -m pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: python -m ruff check tools tests
      - name: Mypy (types)
        run: python -m mypy tools tests/python
      - name: Pytest (contract tests)
        run: python -m pytest tests/python/test_feature_encoding.py -v --junitxml=pytest-unit.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-unit
          path: pytest-unit.xml

  # Aggregate every JUnit report into one "Test Results" check so all ~48
  # named tests are visible with pass/fail before merging.
  test-results:
    name: test results
    needs: [build-and-test, integration, python-quality]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: results
          pattern: results-*
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: results/**/*.xml
          check_name: "Test Results (perft + invariants + UCI + unit)"
          comment_mode: "off"
