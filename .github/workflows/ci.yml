name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Build once on Linux; the granular correctness checks below reuse the
  # binaries so each check is a single, fast, clearly-named goal.
  build:
    name: build · linux release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ENGINE_NATIVE=OFF: this artifact is downloaded and executed by the
      # correctness jobs below, which land on *different* runner CPUs. A
      # -march=native build would bake in the build runner's ISA and SIGILL on
      # any older downstream runner. The portable baseline (magic bitboards +
      # scalar NNUE via the compile-time fallbacks) runs everywhere and keeps
      # the same deterministic node counts.
      - run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DENGINE_NATIVE=OFF && cmake --build build -j
      - uses: actions/upload-artifact@v7
        with:
          name: engine-linux
          path: |
            build/bin/ChessEngine
            build/bin/test_zobrist

  # ---- perft: one check per reference position (all depths) ----
  perft-startpos:
    name: perft · startpos
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1" 1 20
          ./ChessEngine --perft-one "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1" 3 8902
          ./ChessEngine --perft-one "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1" 5 4865609

  perft-kiwipete:
    name: perft · kiwipete
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "r3k2r/p1ppqpb1/bn2pnp1/3PN3/1p2P3/2N2Q1p/PPPBBPPP/R3K2R w KQkq - 0 1" 3 97862
          ./ChessEngine --perft-one "r3k2r/p1ppqpb1/bn2pnp1/3PN3/1p2P3/2N2Q1p/PPPBBPPP/R3K2R w KQkq - 0 1" 5 193690690

  perft-position3:
    name: perft · position 3 (endgame)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "8/2p5/3p4/KP5r/1R3p1k/8/4P1P1/8 w - - 0 1" 5 674624
          ./ChessEngine --perft-one "8/2p5/3p4/KP5r/1R3p1k/8/4P1P1/8 w - - 0 1" 6 11030083

  perft-position4:
    name: perft · position 4 (promotions)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "r3k2r/Pppp1ppp/1b3nbN/nP6/BBP1P3/q4N2/Pp1P2PP/R2Q1RK1 w kq - 0 1" 4 422333
          ./ChessEngine --perft-one "r3k2r/Pppp1ppp/1b3nbN/nP6/BBP1P3/q4N2/Pp1P2PP/R2Q1RK1 w kq - 0 1" 5 15833292

  perft-position5:
    name: perft · position 5
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "rnbq1k1r/pp1Pbppp/2p5/8/2B5/8/PPP1NnPP/RNBQK2R w KQ - 1 8" 4 2103487

  perft-position6:
    name: perft · position 6
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          ./ChessEngine --perft-one "r4rk1/1pp1qppp/p1np1n2/2b1p1B1/2B1P1b1/P1NP1N2/1PP1QPPP/R4RK1 w - - 0 10" 4 3894594

  # ---- state / evaluation invariants ----
  nnue-bitexact:
    name: nnue · simd == scalar
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: chmod +x test_zobrist && ./test_zobrist nnue

  state-consistency:
    name: state · make/unmake + movegen
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: chmod +x test_zobrist && ./test_zobrist games

  bench-signature:
    name: search · bench signature
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: chmod +x ChessEngine && bash tools/bench_signature.sh ./ChessEngine

  # ---- UCI behaviour: one check per behaviour group ----
  uci-protocol:
    name: uci · protocol
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          python -m pip install pytest
          ENGINE_BIN=$PWD/ChessEngine python -m pytest tests/python/test_uci_behavior.py -v -k "handshake or isready or ucinewgame or startpos_returns"

  uci-mates:
    name: uci · mate / stalemate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          python -m pip install pytest
          ENGINE_BIN=$PWD/ChessEngine python -m pytest tests/python/test_uci_behavior.py -v -k "mate or stalemate or checkmate"

  uci-rules:
    name: uci · rules (promotion / searchmoves / illegal)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          python -m pip install pytest
          ENGINE_BIN=$PWD/ChessEngine python -m pytest tests/python/test_uci_behavior.py -v -k "illegal or promotion or searchmoves"

  uci-limits:
    name: uci · search limits
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - uses: actions/download-artifact@v4
        with: { name: engine-linux }
      - run: |
          chmod +x ChessEngine
          python -m pip install pytest
          ENGINE_BIN=$PWD/ChessEngine python -m pytest tests/python/test_uci_behavior.py -v -k "nodes_limit or bench_signature"

  # ---- portability: full ctest on other compilers / OSes ----
  portability:
    name: portability · ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  cc: clang, cxx: clang++, id: linux-clang }
          - { os: macos-latest,                            id: macos-arm64 }
          - { os: windows-latest,                          id: windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure & build (Unix)
        if: runner.os != 'Windows'
        run: |
          EXTRA=""
          if [ -n "${{ matrix.cxx }}" ]; then EXTRA="-DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}"; fi
          if [ "${{ runner.os }}" = "macOS" ]; then EXTRA="$EXTRA -DENGINE_NATIVE=OFF"; fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA
          cmake --build build -j
      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure
      - name: Configure & build (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build && cmake --build build --config Release
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Release --output-on-failure

  # ---- safety & style ----
  clang-format:
    name: lint · clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting (whole tree, excluding vendored code)
        run: git ls-files '*.cpp' '*.h' | grep -v '^src/syzygy/' | xargs clang-format --dry-run --Werror

  clang-tidy:
    name: lint · clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-tidy-18
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18
      - name: Configure (export compile commands)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DENGINE_NATIVE=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy on engine sources
        run: >
          git ls-files 'src/*.cpp' 'app/*.cpp'
          | xargs clang-tidy-18 -p build
          --warnings-as-errors='bugprone-*,performance-*,modernize-*'

  sanitizers:
    name: safety · asan + ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug -DENGINE_LTO=OFF -DENGINE_NATIVE=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
          && cmake --build build -j
      - run: ./build/bin/test_zobrist
      - run: printf "setoption name Threads value 1\nbench 8\nquit\n" | ./build/bin/ChessEngine

  lint:
    name: python · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: python -m pip install -r requirements-dev.txt && python -m ruff check tools tests

  types:
    name: python · mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: python -m pip install -r requirements-dev.txt && python -m mypy tools tests/python

  unit:
    name: python · unit (feature contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: python -m pip install pytest && python -m pytest tests/python/test_feature_encoding.py -v
