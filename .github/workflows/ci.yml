name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ---------- Linux ----------
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build -j

      - name: Perft suite (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: ./bin/ChessEngine --perft

      - name: State/movegen/NNUE consistency (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: ./bin/test_zobrist

      - name: Bench regression (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: printf "bench 8\nquit\n" | ./bin/ChessEngine

      - name: UCI smoke test (Linux)
        if: runner.os == 'Linux'
        run: python tests/uci_smoke.py build/bin/ChessEngine

      # ---------- Windows ----------
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Perft suite (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: .\bin\Release\ChessEngine.exe --perft

      - name: State/movegen/NNUE consistency (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: .\bin\Release\test_zobrist.exe

      - name: Bench regression (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        shell: pwsh
        run: '"bench 8`nquit" | .\bin\Release\ChessEngine.exe'

      - name: UCI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tests/uci_smoke.py build/bin/Release/ChessEngine.exe
