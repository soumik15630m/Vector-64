# Python tooling config for the training / export utilities under tools/.
# The C++ engine is built with CMake; this only governs the Python side.

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = ["build", "build-*", "cmake-build-*", "artifacts", "tools/data"]

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, pyupgrade, flake8-bugbear, comprehensions.
select = ["E", "F", "W", "I", "UP", "B", "C4"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E402"]  # tests may adjust sys.path before importing

[tool.mypy]
python_version = "3.10"
# torch / numpy / zstandard / datasets ship partial or no stubs.
ignore_missing_imports = true
warn_redundant_casts = true
namespace_packages = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["pytest.*", "_pytest.*"]
follow_imports = "skip"
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests/python"]
addopts = "-q"
